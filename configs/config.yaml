# Configuration for Extended Facial Emotion Recognition System

# Data paths
data:
  fer2013_path: "data/fer2013/fer2013.csv"
  checkpoint_dir: "checkpoints/"
  logs_dir: "logs/"

# Emotion labels
emotions:
  classes: ["Angry", "Disgust", "Fear", "Happy", "Sad", "Surprise", "Neutral"]
  num_classes: 7

# Preprocessing
preprocessing:
  grayscale: true
  median_filter:
    enabled: true
    kernel_size: 3
  histogram_equalization:
    enabled: true
    clip_limit: 2.0  # for CLAHE (Contrast Limited Adaptive HE)
  gaussian_blur:
    enabled: false
    kernel_size: 3
    sigma: 0

# Face detection and landmarks
face_detection:
  method: "mediapipe"  # Options: mediapipe, dlib
  mediapipe:
    static_image_mode: false
    max_num_faces: 1
    min_detection_confidence: 0.5
    min_tracking_confidence: 0.5
  dlib:
    predictor_path: "models/shape_predictor_68_face_landmarks.dat"

# Zone extraction
zones:
  resolution: 48  # Zone images resized to 48x48
  normalization: "minmax"  # Options: minmax, standard
  zones_definition:
    forehead: [10, 338, 297, 332, 284, 251, 389, 356, 454, 323, 361, 288]
    left_eye: [33, 7, 163, 144, 145, 153, 154, 155, 133, 173, 157, 158, 159, 160, 161, 246]
    right_eye: [263, 249, 390, 373, 374, 380, 381, 382, 362, 398, 384, 385, 386, 387, 388, 466]
    nose: [4, 5, 6, 168, 197, 195, 51, 281]
    mouth: [61, 146, 91, 181, 84, 17, 314, 405, 321, 375, 291, 308, 324, 318, 402, 317, 14, 87, 178, 88, 95]

# Model architecture
model:
  global_cnn:
    input_size: 224
    channels: [64, 128, 256, 512]
    kernel_size: 3
    feature_dim: 512
    dropout: 0.5
    pretrained: true  # Use pretrained EfficientNet-B0 weights
  
  zone_cnn:
    input_size: 48
    channels: [32, 64, 128]
    kernel_size: 3
    feature_dim: 128
    dropout: 0.3
  
  lstm:
    sequence_length: 16  # Number of frames in sequence
    hidden_units: [256, 128]
    dropout: 0.5
    bidirectional: false
  
  classifier:
    hidden_units: [256]
    dropout: 0.5

# Training
training:
  batch_size: 32
  epochs: 30
  learning_rate: 0.0001
  optimizer: "adam"
  loss: "categorical_crossentropy"
  
  early_stopping:
    enabled: true
    patience: 10
    min_delta: 0.001
  
  lr_schedule:
    enabled: true
    factor: 0.5
    patience: 5
    min_lr: 0.000001
  
  data_split:
    train: 0.8
    validation: 0.1
    test: 0.1
  
  augmentation:
    enabled: true
    brightness_range: [0.7, 1.3]
    gaussian_noise_std: 0.05
    motion_blur:
      enabled: true
      kernel_range: [5, 15]
    occlusion:
      enabled: true
      coverage_range: [0.1, 0.2]
      num_rectangles: [1, 3]
    rotation_range: 15
    horizontal_flip: true
    zoom_range: 0.1

# inference:
#   video_source: 0  # 0 for webcam, or path to video file
#   frame_skip: 1  # Process every Nth frame
#   display:
#     show_landmarks: true
#     show_zones: true
#     show_probabilities: true
#     font_scale: 0.7
#     thickness: 2
  
#   smoothing:
#     enabled: true
#     method: "moving_average"  # Options: moving_average, exponential
#     window_size: 5
  
#   fps_target: 20

# Inference
inference:
  # Source type: webcam, image, or video
  mode: webcam
  
  # Video/webcam settings
  sequence_length: 16
  frame_stride: 2
  smoothing_window: 5
  
  # Display options
  display:
    show_landmarks: true
    show_zones: true
    show_probabilities: true
  
  # Output settings
  output:
    save_predictions: true
    save_visualizations: true
    create_reports: true
  
  # Performance settings
  confidence_threshold: 0.5
  fps_target: 20

# Hardware
hardware:
  device: "cuda"  # Options: cuda, cpu
  mixed_precision: false
  num_workers: 4
  pin_memory: true

# Logging
logging:
  tensorboard: true
  save_frequency: 1  # Save checkpoint every N epochs
  log_frequency: 10  # Log metrics every N batches
  verbose: true
